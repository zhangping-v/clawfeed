<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClawFeed</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      word-break: break-word;
      transition: background .3s, color .3s;
    }

    body.light {
      background: #f5f5f5;
      color: #1a1a1a;
    }

    body.light .subtitle {
      color: #888;
    }

    body.light .tab {
      background: #e8e8e8;
      border-color: #ccc;
      color: #666;
    }

    body.light .tab:hover {
      border-color: #999;
      color: #333;
    }

    body.light .tab.active {
      background: #ddd;
      border-color: #999;
      color: #111;
    }

    body.light .digest-card {
      background: #fff;
      border-color: #ddd;
    }

    body.light .digest-card:hover {
      background: #fafafa;
      border-color: #bbb;
    }

    body.light .digest-card .excerpt {
      color: #888;
    }

    body.light .digest-card .time-badge {
      background: #f0f0f0;
      border-color: #ddd;
      color: #666;
    }

    body.light .date-group-header {
      color: #888;
      border-color: #e0e0e0;
    }

    body.light .date-group-header .count {
      color: #aaa;
    }

    body.light .digest-viewer {
      background: #fff;
      border-color: #ddd;
      color: #333;
    }

    body.light .back-btn {
      background: #e8e8e8;
      border-color: #ccc;
      color: #666;
    }

    body.light .back-btn:hover {
      color: #111;
      border-color: #999;
    }

    body.light .mark-card {
      background: #fff;
      border-color: #ddd;
    }

    body.light .mark-card:hover {
      background: #fafafa;
      border-color: #bbb;
    }

    body.light .source-card {
      background: #fff;
      border-color: #ddd;
    }

    body.light .source-card:hover {
      background: #fafafa;
      border-color: #bbb;
    }

    body.light .source-form {
      background: #fff;
      border-color: #ddd;
    }

    body.light .source-form input,
    body.light .source-form select,
    body.light .source-form textarea {
      background: #f5f5f5;
      border-color: #ccc;
      color: #333;
    }

    body.light .mark-stat {
      background: #fff;
      border-color: #ddd;
    }

    body.light .toast {
      background: #333;
    }

    body.light .changelog-overlay {
      background: rgba(255, 255, 255, 0.92);
    }

    body.light .changelog-inner {
      color: #333;
    }

    body.light .changelog-inner h1 {
      color: #111;
    }

    body.light .changelog-inner h2 {
      color: #0066cc;
      border-color: #ddd;
    }

    body.light .changelog-inner h3 {
      color: #444;
    }

    body.light .changelog-inner li {
      color: #555;
    }

    body.light .changelog-inner code {
      background: #e8f0fe;
      color: #0066cc;
    }

    body.light .user-dropdown {
      background: #fff;
      border-color: #ddd;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .1);
    }

    body.light .user-dropdown a {
      color: #555;
    }

    body.light .user-dropdown a:hover {
      background: #f0f0f0;
      color: #111;
    }

    body.light .empty {
      color: #999;
    }

    .theme-toggle {
      background: none;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      line-height: 1;
      transition: all .2s;
      color: #888;
    }

    .theme-toggle:hover {
      border-color: #555;
      color: #ccc;
    }

    body.light .theme-toggle {
      border-color: #ccc;
      color: #666;
    }

    body.light .theme-toggle:hover {
      border-color: #999;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      font-size: 1.8em;
      margin-bottom: 8px;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.3em;
      }
    }

    .subtitle {
      color: #999;
      margin-bottom: 24px;
      font-size: 0.95em;
      letter-spacing: 0.5px;
    }

    .subtitle .agent-name {
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .subtitle .agent-name:hover {
      opacity: 0.85;
    }

    .subtitle .agent-name.zylos {
      background: linear-gradient(135deg, #9b59b6, #8e44ad);
      color: #fff;
    }

    .subtitle .agent-name.openclaw {
      background: linear-gradient(135deg, #e67e22, #d35400);
      color: #fff;
    }

    body.light .subtitle .agent-name.zylos {
      background: linear-gradient(135deg, #a855f7, #7c3aed);
    }

    body.light .subtitle .agent-name.openclaw {
      background: linear-gradient(135deg, #f59e0b, #d97706);
    }

    /* Changelog modal */
    .changelog-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      overflow-y: auto;
      display: none;
    }

    .changelog-overlay.open {
      display: flex;
      justify-content: center;
    }

    .changelog-inner {
      max-width: 750px;
      width: 100%;
      padding: 40px 24px 60px;
      color: #e0e0e0;
      position: relative;
    }

    .changelog-close {
      position: fixed;
      top: 16px;
      right: 24px;
      font-size: 28px;
      color: #888;
      cursor: pointer;
      z-index: 10000;
      background: none;
      border: none;
    }

    .changelog-close:hover {
      color: #fff;
    }

    .changelog-inner h1 {
      font-size: 2em;
      margin-bottom: 24px;
      color: #fff;
    }

    .changelog-inner h2 {
      font-size: 1.4em;
      margin: 32px 0 8px;
      color: #6cf;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
    }

    .changelog-inner h3 {
      font-size: 1.1em;
      margin: 16px 0 8px;
      color: #ccc;
    }

    .changelog-inner ul {
      margin: 0 0 8px 20px;
    }

    .changelog-inner li {
      margin: 4px 0;
      line-height: 1.6;
      color: #bbb;
    }

    .changelog-inner code {
      background: #1a1a2e;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
      color: #6cf;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 16px;
      border-radius: 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      cursor: pointer;
      color: #aaa;
      font-size: 14px;
      transition: all 0.2s;
    }

    .tab:hover {
      border-color: #555;
      color: #fff;
    }

    .tab.active {
      background: #2a2a2a;
      border-color: #666;
      color: #fff;
    }

    .digest-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .date-group {
      margin-bottom: 4px;
    }

    .date-group-header {
      font-size: 13px;
      color: #666;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 8px 0 6px;
      border-bottom: 1px solid #1e1e1e;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-group-header .count {
      font-size: 11px;
      color: #444;
      font-weight: 400;
    }

    .date-group-items {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .digest-card {
      background: #1a1a1a;
      border: 1px solid #282828;
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .digest-card:hover {
      border-color: #444;
      background: #1e1e1e;
    }

    .digest-card .card-body {
      flex: 1;
      min-width: 0;
    }

    .digest-card .title {
      font-size: 14px;
      font-weight: 500;
    }

    .digest-card .excerpt {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.5;
    }

    .digest-card .time-badge {
      font-size: 12px;
      color: #666;
      background: #141414;
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid #222;
      white-space: nowrap;
    }

    .digest-viewer {
      display: none;
      background: #1a1a1a;
      border: 1px solid #282828;
      border-radius: 12px;
      padding: 24px;
      margin-top: 16px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: break-word;
      font-size: 14px;
      max-height: 80vh;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .digest-viewer a {
      color: #58a6ff;
      text-decoration: none;
    }

    .digest-viewer a:hover {
      text-decoration: underline;
    }

    .back-btn {
      display: inline-block;
      margin-bottom: 16px;
      padding: 6px 14px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #aaa;
      cursor: pointer;
      font-size: 13px;
    }

    .back-btn:hover {
      color: #fff;
      border-color: #666;
    }

    .empty {
      color: #555;
      text-align: center;
      padding: 40px;
      font-size: 14px;
    }

    .loading {
      color: #555;
      text-align: center;
      padding: 20px;
    }

    .mark-btn {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 8px;
      font-size: 11px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #f0b040;
      cursor: pointer;
      vertical-align: middle;
      transition: all .15s;
      text-decoration: none;
    }

    .mark-btn:hover {
      background: #3a3a1a;
      border-color: #f0b040;
      text-decoration: none;
    }

    .mark-btn.marked {
      color: #40c040;
      border-color: #40c040;
      cursor: default;
    }

    .mark-btn.disabled {
      color: #555;
      border-color: #333;
      cursor: pointer;
      opacity: .6;
    }

    .mark-btn.disabled:hover {
      background: #2a2a2a;
      border-color: #555;
    }

    .user-menu {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .user-dropdown {
      display: none;
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 6px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 6px 0;
      min-width: 120px;
      z-index: 100;
      box-shadow: 0 4px 12px rgba(0, 0, 0, .4);
    }

    .user-dropdown.show {
      display: block;
    }

    .user-dropdown a {
      display: block;
      padding: 8px 16px;
      color: #aaa;
      text-decoration: none;
      font-size: 13px;
      transition: all .15s;
    }

    .user-dropdown a:hover {
      background: #2a2a2a;
      color: #fff;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 999;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
    }

    .mark-card {
      background: #1a1a1a;
      border: 1px solid #282828;
      border-radius: 12px;
      padding: 16px 20px;
      transition: all 0.2s;
    }

    .mark-card:hover {
      border-color: #444;
      background: #1e1e1e;
    }

    .mark-card .mark-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .mark-card .mark-date {
      font-size: 12px;
      color: #666;
    }

    .mark-card .mark-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
    }

    .mark-card .mark-status.pending {
      background: #3a2a00;
      color: #f0b040;
    }

    .mark-card .mark-status.done {
      background: #0a2a0a;
      color: #40c040;
    }

    .mark-card .mark-author {
      font-size: 14px;
      font-weight: 600;
      color: #58a6ff;
    }

    .mark-card .mark-link {
      margin-top: 6px;
    }

    .mark-card .mark-link a {
      font-size: 12px;
      color: #666;
      text-decoration: none;
      word-break: break-all;
    }

    .mark-card .mark-link a:hover {
      color: #58a6ff;
      text-decoration: underline;
    }

    .mark-stats {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .mark-stat {
      background: #1a1a1a;
      border: 1px solid #282828;
      border-radius: 8px;
      padding: 12px 16px;
      flex: 1;
      text-align: center;
    }

    .mark-stat .num {
      font-size: 24px;
      font-weight: 700;
    }

    .mark-stat .label {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .source-card {
      background: #1a1a1a;
      border: 1px solid #282828;
      border-radius: 12px;
      padding: 16px 20px;
      transition: all 0.2s;
    }

    .source-card:hover {
      border-color: #444;
      background: #1e1e1e;
    }

    .source-card .source-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .source-card .source-name {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .source-card .source-meta {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .source-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .source-actions button {
      padding: 4px 10px;
      font-size: 12px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 6px;
      color: #aaa;
      cursor: pointer;
      transition: all .15s;
    }

    .source-actions button:hover {
      border-color: #666;
      color: #fff;
    }

    .source-actions button.danger:hover {
      border-color: #f04040;
      color: #f04040;
    }

    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      transition: .3s;
    }

    .toggle-slider:before {
      content: '';
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background: #888;
      border-radius: 50%;
      transition: .3s;
    }

    .toggle-switch input:checked+.toggle-slider {
      background: #2a5a2a;
    }

    .toggle-switch input:checked+.toggle-slider:before {
      transform: translateX(16px);
      background: #40c040;
    }

    .source-form {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .source-form .form-row {
      margin-bottom: 12px;
    }

    .source-form label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }

    .source-form input,
    .source-form select,
    .source-form textarea {
      width: 100%;
      padding: 8px 12px;
      background: #0f0f0f;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 13px;
      font-family: inherit;
    }

    .source-form textarea {
      min-height: 60px;
      resize: vertical;
      font-family: monospace;
    }

    .category-group {
      margin-bottom: 24px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 12px;
      border: 1px solid #222;
    }

    .category-title {
      font-size: 14px;
      font-weight: 700;
      color: #40c040;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #222;
      padding-bottom: 8px;
      cursor: pointer;
      user-select: none;
    }

    .category-title:hover {
      opacity: 0.8;
    }

    .subcategory-group {
      margin-left: 12px;
      margin-bottom: 16px;
      border-left: 2px solid #333;
      padding-left: 12px;
    }

    .subcategory-title {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      user-select: none;
    }

    .subcategory-title:hover {
      opacity: 0.8;
    }

    .collapsed-content {
      display: none;
    }

    .edit-group-btn {
      opacity: 0;
      font-size: 11px;
      color: #666;
      cursor: pointer;
      margin-left: auto;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: none;
      letter-spacing: normal;
      font-weight: 400;
    }

    .category-title:hover .edit-group-btn,
    .subcategory-title:hover .edit-group-btn {
      opacity: 1;
    }

    .edit-group-btn:hover {
      color: #40c040;
      background: rgba(255, 255, 255, 0.05);
    }

    .group-chevron {
      font-size: 10px;
      transition: transform 0.2s;
      display: inline-block;
      width: 12px;
    }

    .group-chevron.collapsed {
      transform: rotate(-90deg);
    }

    body.light .category-group {
      background: #fff;
      border-color: #eee;
    }

    body.light .category-title {
      color: #2d8a2d;
      border-color: #eee;
    }

    body.light .subcategory-group {
      border-color: #ddd;
    }

    .source-form .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .source-form .form-actions button {
      padding: 8px 20px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #ccc;
      cursor: pointer;
      font-size: 13px;
      transition: all .2s;
    }

    .source-form .form-actions button.primary {
      background: #1a3a1a;
      border-color: #40c040;
      color: #40c040;
    }

    .source-form .form-actions button:hover {
      border-color: #666;
      color: #fff;
    }

    /* Search Bar Styles */
    .source-search-container {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      background: #111;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #222;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .source-search-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 12px;
      color: #e0e0e0;
      font-size: 13px;
    }

    .source-search-input:focus {
      border-color: #40c040;
      outline: none;
    }

    .source-search-select {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
    }

    body.light .source-search-container {
      background: #f9f9f9;
      border-color: #eee;
    }

    body.light .source-search-input,
    body.light .source-search-select {
      background: #fff;
      border-color: #ddd;
      color: #333;
    }
  </style>
</head>

<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:8px;">
      <h1 style="margin:0;cursor:pointer" onclick="goHome()">☀️ ClawFeed</h1>
      <div style="display:flex;align-items:center;gap:8px;">
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
        <span onclick="switchToSources()"
          style="cursor:pointer;font-size:16px;line-height:0;padding:4px;color:#666;transition:color .2s;"
          onmouseover="this.style.color='#ccc'" onmouseout="this.style.color='#666'" title="管理信息源">📡</span>
        <div class="user-menu" onclick="document.getElementById('moreDropdown').classList.toggle('show')">

    function setLang(l) {
      lang = l;
      localStorage.setItem('digest_lang', l);
      applyLang();
      renderList();

    function applyLang() {
      document.querySelector('h1').textContent = t('title');
      const cl = document.getElementById('changelogLink'); if (cl) cl.textContent = t('changelog');
      const lt = document.getElementById('langToggleLabel');
      if (lt) lt.textContent = lang === 'zh' ? 'EN' : '中文';

      document.querySelector('[data-type="monthly"]').textContent = t('tabMonthly');
      document.querySelector('[data-type="marks"]').textContent = t('tabMarks');
    }

    // ── Changelog ──
    function parseChangelogMd(md) {
      return md.split('\n').map(line => {
        // headers
        if (line.startsWith('### ')) return `<h3>${esc(line.slice(4))}</h3>`;
        if (line.startsWith('## ')) return `<h2>${esc(line.slice(3))}</h2>`;
        if (line.startsWith('# ')) return `<h1>${esc(line.slice(2))}</h1>`;
        // list items with bold and code
        if (line.startsWith('- ')) {
          let content = esc(line.slice(2));
          content = content.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
          content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
          return `<li>${content}</li>`;
        }
        if (line.trim() === '') return '';
        return `<p>${esc(line)}</p>`;
      }).join('\n')
        .replace(/(<li>)/g, m => m) // wrap consecutive li in ul
        .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
    }
    function esc(s) {
      if (s === null || s === undefined) return '';
      if (typeof s !== 'string') s = String(s);
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escJS(s) {
      if (s === null || s === undefined) return '';
      if (typeof s !== 'string') s = String(s);
      return s.replace(/'/g, "\\'").replace(/"/g, '\\"');
    }

    async function showChangelog() {
      const overlay = document.getElementById('changelogOverlay');
      const content = document.getElementById('changelogContent');
      content.innerHTML = '<p style="text-align:center;padding:40px;">⏳</p>';
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      try {
        const r = await fetch(`${API}/changelog?lang=${lang}`);
        const d = await r.json();
        content.innerHTML = parseChangelogMd(d.content);
      } catch { content.innerHTML = '<p>Failed to load changelog.</p>'; }
    }
    function hideChangelog() {
      document.getElementById('changelogOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }
    async function showRoadmap() {
      const overlay = document.getElementById('changelogOverlay');
      const content = document.getElementById('changelogContent');
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      content.innerHTML = '<p>Loading...</p>';
      try {
        const r = await fetch(`${API}/roadmap?lang=${lang}`);
        const d = await r.json();
        content.innerHTML = parseChangelogMd(d.content);
      } catch { content.innerHTML = '<p>Failed to load roadmap.</p>'; }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') hideChangelog(); });

    // API base — auto-detect: if served under /digest/, use /digest/api; otherwise /api
    const API = (() => {
      const p = location.pathname;
      if (p.startsWith('/staging/clawfeed')) return '/staging/clawfeed/api';
      if (p.startsWith('/digest')) return '/digest/api';
      return '/api';
    })();

      currentOffset = 0; allLoaded = false;

    async function exportSources() {
      try {
        const r = await fetch(`${API}/sources/export`);
        const blob = await r.blob();
        const filename = `clawfeed-sources-${new Date().toISOString().slice(0, 10)}.json`;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        showToast(lang === 'zh' ? '导出成功' : 'Exported!');
      } catch (e) { showToast('Error: ' + e.message); }
    }


    function WEEKDAYS() { return t('weekdays'); }
    let currentType = '4h';
    let markedUrls = new Map();
    const PAGE_SIZE = 10;
    let collapsedGroups = new Set(JSON.parse(localStorage.getItem('collapsedGroups') || '[]'));
    function toggleGroup(key) {
      if (collapsedGroups.has(key)) collapsedGroups.delete(key);
      else collapsedGroups.add(key);
      localStorage.setItem('collapsedGroups', JSON.stringify([...collapsedGroups]));
      renderSources(true);
    }

    async function renameGroup(e, type, cat, sub) {
      e.stopPropagation();
      const oldVal = type === 'cat' ? cat : sub;
      const newVal = prompt(lang === 'zh' ? `重命名分类 "${oldVal}"` : `Rename "${oldVal}"`, oldVal);
      if (newVal === null) return;
      const cleanNew = newVal.trim();
      if (cleanNew === oldVal) return;

      const body = { oldCategory: cat };
      if (type === 'cat') {
        body.newCategory = cleanNew;
      } else {
        body.oldSubcategory = sub;
        body.newSubcategory = cleanNew;
        body.newCategory = cat; // Subcategory rename is within its category
      }

      await fetch(`${API}/subscriptions/rename-group`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify(body)
      });
      renderSources();
    }
    let currentOffset = 0;
    let allLoaded = false;
    let lastSubscriptions = [];
    let allSourcesList = [];
    let sourceSearchText = '';
    let sourceSearchType = 'all';
    let sourceSearchCat = 'all';

    function parseCreatedAt(d) {
      const ca = d.created_at;
      // Handle week format: "2026-W07"
      if (/^\d{4}-W\d{2}$/.test(ca)) {
        const [y, w] = ca.split('-W').map(Number);
        // Approximate: week 1 starts Jan 1
        const jan1 = new Date(y, 0, 1);
        return new Date(jan1.getTime() + (w - 1) * 7 * 86400000);
      }
      // Handle month format: "2026-02"
      if (/^\d{4}-\d{2}$/.test(ca)) {
        return new Date(ca + '-01T00:00:00Z');
      }
      // Handle year format: "2026"
      if (/^\d{4}$/.test(ca)) {
        return new Date(ca + '-01-01T00:00:00Z');
      }
      return new Date(ca.replace(' ', 'T') + (ca.includes('+') || ca.includes('Z') ? '' : 'Z'));
    }

    function getWeekKey(dt) {
      const d = new Date(dt); d.setHours(0, 0, 0, 0);
      const jan1 = new Date(d.getFullYear(), 0, 1);
      const days = Math.floor((d - jan1) / 86400000);
      const week = Math.ceil((days + jan1.getDay() + 1) / 7);
      return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
    }

    function groupDigests(digests) {
      const groups = {}; const order = [];
      function localDateStr(dt) { return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`; }
      function localMonthStr(dt) { return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`; }
      for (const d of digests) {
        const dt = parseCreatedAt(d);
        let key;
        if (currentType === '4h') {
          key = localDateStr(dt); // by local day
        } else if (currentType === 'daily') {
          key = getWeekKey(dt); // by week
        } else if (currentType === 'weekly') {
          key = localMonthStr(dt); // by local month
        } else {
          key = String(dt.getFullYear()); // by local year
        }
        if (!groups[key]) { groups[key] = []; order.push(key); }
        groups[key].push({ ...d, _dt: dt });
      }
      return { groups, order };
    }

    function formatGroupLabel(type, key) {
      if (type === '4h') {
        const d = new Date(key + 'T00:00:00Z');
        const wd = WEEKDAYS()[d.getDay()];
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const diff = Math.round((today - new Date(d.toDateString())) / 86400000);
        if (diff === 0) return `📅 ${t('today')} · ${key} ${wd}`;
        if (diff === 1) return `📅 ${t('yesterday')} · ${key} ${wd}`;
        return `📅 ${key} ${wd}`;
      }
      if (type === 'daily') {
        const [y, w] = key.split('-W');
        return t('weekLabel')(y, parseInt(w));
      }
      if (type === 'weekly') {
        const [y, m] = key.split('-');
        return t('monthLabel')(y, parseInt(m));
      }
      if (type === 'monthly') {
        return t('yearLabel')(key);
      }
      return `📅 ${key}`;
    }

    function extractExcerpt(content) {
      if (!content) return '';
      const lines = content.split('\n');
      const highlights = [];
      let inImportant = false;
      for (const line of lines) {
        const trimmed = line.trim();
        // Detect 🔥重要 section
        if (trimmed.includes('🔥')) { inImportant = true; continue; }
        // Stop at next section header
        if (inImportant && (trimmed.startsWith('📰') || trimmed.startsWith('🔖') || trimmed.startsWith('🔍') || trimmed.startsWith('👀') || trimmed.startsWith('🧹') || trimmed.startsWith('💤'))) break;
        if (inImportant && trimmed.startsWith('•')) {
          let clean = trimmed.replace(/^•\s*/, '').replace(/\*\*/g, '').replace(/https?:\/\/\S+/g, '').replace(/（来源[^）]*）/g, '').trim();
          if (clean.length > 8) highlights.push(clean.length > 80 ? clean.slice(0, 80) + '…' : clean);
          if (highlights.length >= 2) break;
        }
      }
      if (highlights.length) return highlights.join(' · ');
      // Fallback: find first bullet with substance
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('>') || trimmed === '---' || /^[☀️🔥📰📅]/.test(trimmed) || trimmed.startsWith('*基于')) continue;
        let clean = trimmed.replace(/^[•\-\*]\s*/, '').replace(/\*\*/g, '').replace(/https?:\/\/\S+/g, '').trim();
        if (clean.length > 15) return clean.length > 120 ? clean.slice(0, 120) + '…' : clean;
      }
      return '';
    }

    let loadedDigests = [];

    function goHome() {
      currentType = '4h';
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-type="4h"]').classList.add('active');
      currentOffset = 0; allLoaded = false;
      renderList(); location.hash = '4h';
    }

    async function renderList(append = false) {
      const list = document.getElementById('list');
      const viewer = document.getElementById('viewer');
      viewer.style.display = 'none';

      if (currentType === 'marks') { renderMarks(); return; }
      if (currentType === 'sources') { renderSources(); return; }

      if (!append) {
        currentOffset = 0;
        allLoaded = false;
        loadedDigests = [];
        list.innerHTML = `<div class="loading">${t('loading')}</div>`;
      }

      try {
        const resp = await fetch(`${API}/digests?type=${currentType}&limit=${PAGE_SIZE}&offset=${currentOffset}`);
        const digests = await resp.json();
        if (digests.length < PAGE_SIZE) allLoaded = true;
        loadedDigests = loadedDigests.concat(digests);
        currentOffset += digests.length;

        if (!loadedDigests.length) { list.innerHTML = `<div class="empty">${t('noData')}</div>`; return; }

        const { groups, order } = groupDigests(loadedDigests);
        let html = '';
        for (const gk of order) {
          const items = groups[gk];
          const label = formatGroupLabel(currentType, gk);
          html += `<div class="date-group"><div class="date-group-header">${label} <span class="count">${items.length} ${t('articles')}</span></div><div class="date-group-items">`;
          for (const d of items) {
            const dt = d._dt;
            const time = dt.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
            let title, badge;
            if (currentType === '4h') {
              title = `${time}`; badge = `<span class="time-badge">${time}</span>`;
            } else if (currentType === 'daily') {
              const dateStr = dt.toISOString().slice(0, 10);
              const wd = WEEKDAYS()[dt.getDay()];
              title = `${dateStr} ${wd}`; badge = '';
            } else if (currentType === 'weekly') {
              const wk = getWeekKey(dt);
              title = `第 ${parseInt(wk.split('-W')[1])} 周`; badge = '';
            } else {
              const mon = dt.toISOString().slice(0, 7);
              title = `${parseInt(mon.split('-')[1])} 月`; badge = '';
            }
            const excerpt = extractExcerpt(d.content);
            html += `<div class="digest-card" data-id="${d.id}"><div class="card-body"><div class="title">${title}</div>${excerpt ? `<div class="excerpt">${excerpt}</div>` : ''}</div>${badge}</div>`;
          }
          html += `</div></div>`;
        }
        if (!allLoaded) {
          html += `<div id="load-more" style="text-align:center;padding:16px;"><button onclick="loadMore()" style="padding:10px 32px;background:#2a2a2a;border:1px solid #444;border-radius:8px;color:#aaa;cursor:pointer;font-size:14px;transition:all .2s;">${t('loadMore')}</button></div>`;
        }
        list.innerHTML = html;
        list.querySelectorAll('.digest-card').forEach(card => {
          card.onclick = () => loadDigest(card.dataset.id);

    async function loadDigest(id) {
      const list = document.getElementById('list');
      const viewer = document.getElementById('viewer');
      list.innerHTML = '';
      try {
        const resp = await fetch(`${API}/digests/${id}`);
        const d = await resp.json();
        let text = d.content;
        await loadMarkedUrls();

        text = text.replace(/(https?:\/\/x\.com\/[^\s<)]+)/g, (match) => {
          const clean = match.split('?')[0];
          const isMarked = markedUrls.has(clean);
          const markId = markedUrls.get(clean);
          const markHtml = isMarked
            ? `<span class="mark-btn marked" onclick="doUnmark('${clean}', ${markId}, this)">${t('marked')}</span>`
            : `<span class="mark-btn" onclick="doMark('${clean}', this)">${t('mark')}</span>`;
          return `<a href="${match}" target="_blank">${match}</a>${markHtml}`;
        });
        text = text.replace(/(https?:\/\/(?!x\.com)[^\s<)]+)/g, '<a href="$1" target="_blank">$1</a>');

        viewer.innerHTML = `<div class="back-btn" onclick="renderList()">${t('back')}</div>\n${text}`;
        viewer.style.display = 'block';
      } catch (e) {
        viewer.innerHTML = `<div class="back-btn" onclick="renderList()">${t('back')}</div>\n<div class="empty">${t('cantLoad')}</div>`;
        viewer.style.display = 'block';
      }
    }

    let markViewMode = 'topic'; // 'topic' or 'time'

    function getMarkTopic(m) {
      return m.title || '其他';
    }

    async function renderMarks() {
      const list = document.getElementById('list');
      list.innerHTML = `<div class="loading">${t('loading')}</div>`;
      try {
        const resp = await fetch(`${API}/marks`);
        const marks = await resp.json();
        const pending = marks.filter(m => m.status === 'pending');
        const processed = marks.filter(m => m.status === 'processed');

        let html = `<div class="mark-stats">
      <div class="mark-stat"><div class="num">${marks.length}</div><div class="label">${t('totalMarks')}</div></div>
      <div class="mark-stat"><div class="num">${processed.length}</div><div class="label">${t('deepDived')}</div></div>
      <div class="mark-stat"><div class="num" style="color:#f0b040">${pending.length}</div><div class="label">${t('pending')}</div></div>
    </div>`;

        // View toggle
        html += `<div style="display:flex;gap:8px;margin-bottom:16px;">
      <div class="tab ${markViewMode === 'topic' ? 'active' : ''}" onclick="markViewMode='topic';renderMarks()">${t('byTopic')}</div>
      <div class="tab ${markViewMode === 'time' ? 'active' : ''}" onclick="markViewMode='time';renderMarks()">${t('byTime')}</div>
    </div>`;

        if (!marks.length) {
          html += `<div style="text-align:center;padding:50px 20px;">
        <div style="font-size:36px;margin-bottom:12px;">📌</div>
        <div style="font-size:18px;font-weight:600;margin-bottom:10px;">${t('emptyMarksTitle')}</div>
        <div style="color:#888;font-size:14px;line-height:1.7;white-space:pre-line;">${t('emptyMarksDesc')}</div>
      </div>`;
        } else if (markViewMode === 'topic') {
          // Group by topic
          const topicGroups = {};
          for (const m of marks) {
            const topic = getMarkTopic(m);
            if (!topicGroups[topic]) topicGroups[topic] = [];
            topicGroups[topic].push(m);
          }
          // Sort topics by count desc
          const sortedTopics = Object.entries(topicGroups).sort((a, b) => b[1].length - a[1].length);
          for (const [topic, items] of sortedTopics) {
            html += `<div class="date-group"><div class="date-group-header">${topic} <span class="count">${items.length} ${t('items')}</span></div><div class="date-group-items">`;
            for (const m of items) html += renderMarkCard(m);
            html += `</div></div>`;
          }
        } else {
          // Group by date
          const dateGroups = {}; const dateOrder = [];
          for (const m of marks) {
            const dt = new Date(m.created_at);
            const key = dt.toISOString().slice(0, 10);
            if (!dateGroups[key]) { dateGroups[key] = []; dateOrder.push(key); }
            dateGroups[key].push(m);
          }
          for (const key of dateOrder) {
            const items = dateGroups[key];
            html += `<div class="date-group"><div class="date-group-header">📅 ${key} <span class="count">${items.length} ${t('items')}</span></div><div class="date-group-items">`;
            for (const m of items) html += renderMarkCard(m);
            html += `</div></div>`;
          }
        }
        list.innerHTML = html;
      } catch (e) {
        list.innerHTML = `<div class="empty">${t('cannotLoadMarks')}</div>`;
      }
    }

    <div class="mark-meta">

      <a href="${m.url}" target="_blank" style="font-size:12px;color:#555;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70%;">${m.url.replace('https://x.com/', 'x.com/')}</a>

    </div>
  </div>`;
    }

    const SOURCE_ICONS = { twitter_feed: '🐦', twitter_list: '🐦', rss: '📡', website: '🌐', hackernews: '🔶', reddit: '👽', github_trending: '⭐', custom_api: '🔌', digest_feed: '📰' };
    const SOURCE_TYPES = ['twitter_feed', 'twitter_list', 'rss', 'website', 'hackernews', 'reddit', 'github_trending', 'custom_api', 'digest_feed'];

    function renderSourceCard(s, opts = {}) {

    async function renderSources(skipFetch = false) {
      const list = document.getElementById('list');
      if (!skipFetch) {
        list.innerHTML = `<div class="loading">${t('loading')}</div>`;
      }
      try {
        let subscriptions;
        if (!skipFetch || !lastSubscriptions.length) {
          const subResp = await fetch(`${API}/subscriptions`);
          subscriptions = await subResp.json();
          lastSubscriptions = subscriptions;
        } else {
          subscriptions = lastSubscriptions;
        }

        // Filtering
        const filteredSubs = subscriptions.filter(s => {
          const matchText = !sourceSearchText ||
            s.name.toLowerCase().includes(sourceSearchText.toLowerCase()) ||
            (s.category && s.category.toLowerCase().includes(sourceSearchText.toLowerCase())) ||
            (s.subcategory && s.subcategory.toLowerCase().includes(sourceSearchText.toLowerCase()));
          const matchType = sourceSearchType === 'all' || s.type === sourceSearchType;
          const matchCat = sourceSearchCat === 'all' || s.category === sourceSearchCat;
          return matchText && matchType && matchCat;
        });

        const allAvailableCats = [...new Set(subscriptions.map(s => s.category || '未分类'))].sort();

        // Capture focus state
        const activeSearchId = document.activeElement ? document.activeElement.id : null;
        const selectionStart = (activeSearchId === 'sourceSearchInput' && document.activeElement.tagName === 'INPUT') ? document.activeElement.selectionStart : null;

        const total = subscriptions.length;
        const active = subscriptions.filter(s => s.is_active && !s.is_deleted).length;
        let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
          <h2 style="margin:0;font-size:16px;color:#e0e0e0;">📡 ${lang === 'zh' ? '信息源' : 'Sources'}
            <span style="font-size:12px;color:#666;font-weight:400;margin-left:8px;">${active}/${total} ${lang === 'zh' ? '活跃' : 'active'}</span>
          </h2>
          <button onclick="showSourceForm=true;editingSource=null;renderSources(true)" style="padding:6px 14px;background:#1a3a1a;border:1px solid #40c040;border-radius:6px;color:#40c040;cursor:pointer;font-size:13px;">+ ${lang === 'zh' ? '添加源' : 'Add Source'}</button>
        </div>`;

        // Search UI
        html += `<div class="source-search-container">
          <input type="text" id="sourceSearchInput" class="source-search-input" placeholder="${lang === 'zh' ? '搜索名称、分类...' : 'Search name, category...'}"
            value="${esc(sourceSearchText)}" oninput="sourceSearchText=this.value; renderSources(true)">
          <select class="source-search-select" onchange="sourceSearchType=this.value; renderSources(true)">
            <option value="all">${lang === 'zh' ? '所有类型' : 'All Types'}</option>
            ${SOURCE_TYPES.map(type => `<option value="${type}" ${sourceSearchType === type ? 'selected' : ''}>${SOURCE_ICONS[type] || ''} ${type}</option>`).join('')}
          </select>
          <select class="source-search-select" style="max-width:120px;" onchange="sourceSearchCat=this.value; renderSources(true)">
            <option value="all">${lang === 'zh' ? '所有分类' : 'All'}</option>
            ${allAvailableCats.map(c => `<option value="${esc(c)}" ${sourceSearchCat === c ? 'selected' : ''}>${esc(c)}</option>`).join('')}
          </select>
        </div>`;

        if (!subscriptions.length) {
          html += `<div style="text-align:center;padding:40px 20px;">
            <div style="font-size:28px;margin-bottom:12px;">📡</div>
            <div style="font-size:18px;font-weight:600;margin-bottom:8px;">${lang === 'zh' ? '还没有信息源' : 'No sources yet'}</div>
            <div style="color:#888;font-size:14px;margin-bottom:24px;">${lang === 'zh' ? '添加 RSS、Twitter、Reddit 等信息源，AI 会自动抓取整理。' : 'Add RSS, Twitter, Reddit and more. AI will fetch and summarize them for you.'}</div>
            <button onclick="showSourceForm=true;editingSource=null;renderSources(true)" style="padding:10px 24px;background:#1a3a1a;border:1px solid #40c040;border-radius:8px;color:#40c040;cursor:pointer;font-size:14px;">+ ${lang === 'zh' ? '添加第一个源' : 'Add your first source'}</button>
          </div>`;
        } else {
          if (filteredSubs.length === 0) {
            html += `<div style="text-align:center;padding:40px;color:#666;">${t('noData')}</div>`;
          } else {
            // Grouping by category/subcategory
            const groups = {};
            for (const s of filteredSubs) {
              const cat = s.category || '未分类';
              const sub = s.subcategory || '';
              if (!groups[cat]) groups[cat] = {};
              if (!groups[cat][sub]) groups[cat][sub] = [];
              groups[cat][sub].push(s);
            }
            const sortedCats = Object.keys(groups).sort((a, b) => a === '未分类' ? 1 : b === '未分类' ? -1 : a.localeCompare(b));

            for (const cat of sortedCats) {
              const catCollapsed = collapsedGroups.has('c:' + cat);
              html += `<div class="category-group">
                <div class="category-title" onclick="toggleGroup('c:${escJS(cat)}')">
                  <span class="group-chevron ${catCollapsed ? 'collapsed' : ''}">▾</span> 📂 ${esc(cat)}
                  <span class="edit-group-btn" onclick="renameGroup(event, 'cat', '${escJS(cat)}')">✏️</span>
                </div>
                <div class="${catCollapsed ? 'collapsed-content' : ''}">`;

              const subsInCat = groups[cat];
              for (const sub of Object.keys(subsInCat).sort()) {
                const subKey = `s:${cat}:${sub}`;
                const subCollapsed = collapsedGroups.has(subKey);
                if (sub) {
                  html += `<div class="subcategory-group">
                    <div class="subcategory-title" onclick="event.stopPropagation(); toggleGroup('${escJS(subKey)}')">
                      <span class="group-chevron ${subCollapsed ? 'collapsed' : ''}">▾</span> 🏷️ ${esc(sub)}
                      <span class="edit-group-btn" onclick="renameGroup(event, 'sub', '${escJS(cat)}', '${escJS(sub)}')">✏️</span>
                    </div>
                    <div class="${subCollapsed ? 'collapsed-content' : ''}">`;
                }
                html += '<div class="digest-list" style="gap:8px;margin-bottom:8px;">';
                for (const s of subsInCat[sub]) {
                  if (s.sourceDeleted || s.is_deleted) {
                    html += renderDeletedSourceCard(s);
                  } else {
                    html += renderSourceCard(s, { showToggle: true, showEdit: true, showDelete: true });
                  }
                }
                html += '</div>';
                if (sub) html += '</div></div>';
              }
              html += `</div></div>`;
            }
          }
        }

        html += `<div id="smartAddContainer" style="margin-top:20px;"></div>`;
        html += `<div id="sourceFormContainer"></div>`;

        list.innerHTML = html;
        renderSmartAdd();
        if (showSourceForm) renderSourceForm();

        // Restore Focus
        if (activeSearchId) {
          const el = document.getElementById(activeSearchId);
          if (el) {
            el.focus();
            if (selectionStart !== null) el.setSelectionRange(selectionStart, selectionStart);
          }
        }
      } catch (e) {
        list.innerHTML = `<div class="empty">Failed to load sources: ${esc(e.message)}</div>`;
        console.error(e);
      }
    }






    let resolvedSource = null;

    function renderSmartAdd() {

      let html = `<div class="source-form" style="margin-bottom:16px;">`;

        ${resolvedSource.preview.slice(0, 5).map(p => `<div style="font-size:12px;color:#aaa;padding:2px 0;line-height:1.5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.url ? `<a href="${p.url}" target="_blank" style="color:#58a6ff;text-decoration:none;" title="${p.title}">` : ''}• ${p.title}${p.url ? '</a>' : ''}</div>`).join('')}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">

          <label style="font-size:11px;color:#666;display:block;margin-bottom:4px;">${lang === 'zh' ? '主分类' : 'Category'}</label>

        html += `<div style="margin-top:8px;"><a href="#" onclick="event.preventDefault();toggleSourceForm()" style="font-size:12px;color:#555;text-decoration:none;">${t('manualAdd')} ›</a></div>`;

    async function detectSource() {
      const input = document.getElementById('smart_url');
      const url = (input?.value || '').trim();
      if (!url) return;
      smartAddState = 'loading';
      resolvedSource = null;
      renderSmartAdd();
      try {
        const r = await fetch(`${API}/sources/resolve`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify({ url }) });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'failed');
        resolvedSource = data;
        smartAddState = 'preview';
      } catch (e) {
        smartAddState = 'error';
        smartAddError = e.message;
      }
      renderSmartAdd();
    }

    async function confirmSmartAdd() {
      if (!resolvedSource) return;
      const isPublic = document.getElementById('smart_public')?.checked || false;
      const category = document.getElementById('smart_category')?.value || '';
      const subcategory = document.getElementById('smart_subcategory')?.value || '';
      try {
        await fetch(`${API}/sources`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin',
          body: JSON.stringify({ name: resolvedSource.name, type: resolvedSource.type, config: JSON.stringify(resolvedSource.config), isPublic, category, subcategory })
        });
        showToast(t('sourceCreated'));
        smartAddState = 'input'; resolvedSource = null;
        renderSources();
      } catch (e) { showToast('Error: ' + e.message); }
    }

    function toggleSourceForm() {
      showSourceForm = !showSourceForm;
      editingSource = null;
      renderSourceForm();
    }

    async function editSourceForm(id) {
      try {
        const r = await fetch(`${API}/sources/${id}`, { credentials: 'same-origin' });
        editingSource = await r.json();
        showSourceForm = true;
        renderSourceForm();
        setTimeout(() => document.getElementById('sourceFormContainer')?.scrollIntoView({ behavior: 'smooth' }), 100);
      } catch { }
    }

    const SOURCE_EXAMPLES = {
      twitter_feed: { handle: "@elonmusk", keywords: ["AI", "LLM"] },
      twitter_list: { list_url: "https://x.com/i/lists/123456789" },
      rss: { url: "https://hnrss.org/frontpage" },
      website: { url: "https://news.ycombinator.com", selector: ".titleline > a" },
      hackernews: { filter: "top", min_score: 100 },
      reddit: { subreddit: "MachineLearning", sort: "hot", limit: 20 },
      github_trending: { language: "python", since: "daily" },
      custom_api: { endpoint: "https://api.example.com/feed", headers: { "Authorization": "Bearer xxx" } },
      digest_feed: { url: "https://digest.kevinhe.io/feed/kevin.json" }
    };

    function showFeedInfo() {
      document.getElementById('userDropdown').classList.remove('show');
      if (!currentUser) return;
      // Fetch user slug from /api/auth/me (slug is included)
      fetch(`${API}/auth/me`, { credentials: 'same-origin' }).then(r => r.json()).then(data => {
        const slug = data.user.slug || 'unknown';
        const base = location.origin;
        const jsonUrl = `${base}/feed/${slug}.json`;
        const rssUrl = `${base}/feed/${slug}.rss`;
        const apiUrl = `${base}/feed/${slug}`;
        const modal = document.createElement('div');
        modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center;';
        modal.onclick = e => { if (e.target === modal) modal.remove(); };
        modal.innerHTML = `<div style="background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:24px;max-width:480px;width:90%;">
      <h3 style="margin:0 0 16px;font-size:16px;">📡 Your Feed</h3>
      <div style="margin-bottom:12px;">
        <label style="font-size:12px;color:#888;">JSON Feed</label>
        <div style="display:flex;gap:6px;margin-top:4px;"><input readonly value="${jsonUrl}" style="flex:1;padding:6px 10px;background:#0f0f0f;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:12px;" onclick="this.select()"><button onclick="navigator.clipboard.writeText('${jsonUrl}');showToast('Copied!')" style="padding:6px 12px;background:#2a2a2a;border:1px solid #444;border-radius:6px;color:#aaa;cursor:pointer;font-size:12px;">📋</button></div>
      </div>
      <div style="margin-bottom:12px;">
        <label style="font-size:12px;color:#888;">RSS Feed</label>
        <div style="display:flex;gap:6px;margin-top:4px;"><input readonly value="${rssUrl}" style="flex:1;padding:6px 10px;background:#0f0f0f;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:12px;" onclick="this.select()"><button onclick="navigator.clipboard.writeText('${rssUrl}');showToast('Copied!')" style="padding:6px 12px;background:#2a2a2a;border:1px solid #444;border-radius:6px;color:#aaa;cursor:pointer;font-size:12px;">📋</button></div>
      </div>
      <div style="margin-bottom:16px;">
        <label style="font-size:12px;color:#888;">Simple API</label>
        <div style="display:flex;gap:6px;margin-top:4px;"><input readonly value="${apiUrl}" style="flex:1;padding:6px 10px;background:#0f0f0f;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:12px;" onclick="this.select()"><button onclick="navigator.clipboard.writeText('${apiUrl}');showToast('Copied!')" style="padding:6px 12px;background:#2a2a2a;border:1px solid #444;border-radius:6px;color:#aaa;cursor:pointer;font-size:12px;">📋</button></div>
      </div>
      <div style="text-align:right;"><button onclick="this.closest('div[style*=fixed]').remove()" style="padding:8px 20px;background:#2a2a2a;border:1px solid #444;border-radius:6px;color:#aaa;cursor:pointer;font-size:13px;">Close</button></div>
    </div>`;
        document.body.appendChild(modal);
      });
    }

    function onTypeChange() {
      const sel = document.getElementById('sf_type');
      const ta = document.getElementById('sf_config');
      if (!sel || !ta) return;
      if (editingSource) return; // don't overwrite when editing
      ta.value = JSON.stringify(SOURCE_EXAMPLES[sel.value] || {}, null, 2);
    }

    function renderSourceForm() {
      const container = document.getElementById('sourceFormContainer');
      if (!container) return;
      if (!showSourceForm) { container.innerHTML = ''; return; }
      const s = editingSource;
      const subInfo = s ? lastSubscriptions.find(sub => sub.id === s.id) : null;
      const typeOptions = SOURCE_TYPES.map(ty => `<option value="${ty}" ${s && s.type === ty ? 'selected' : ''}>${SOURCE_ICONS[ty] || ''} ${ty}</option>`).join('');
      let configVal = '';
      if (s) {
        if (typeof s.config === 'object') configVal = JSON.stringify(s.config, null, 2);
        else { try { configVal = JSON.stringify(JSON.parse(s.config), null, 2); } catch { configVal = s.config || ''; } }
      } else {
        configVal = JSON.stringify(SOURCE_EXAMPLES['twitter_feed'], null, 2);
      }

      const allCats = [...new Set(lastSubscriptions.map(sub => sub.category || '未分类'))];
      const allSubs = [...new Set(lastSubscriptions.map(sub => sub.subcategory || '').filter(Boolean))];

      container.innerHTML = `<div class="source-form">
    <div class="form-row"><label>${t('sourceName')}</label><input id="sf_name" value="${esc(s ? s.name : '')}" placeholder="e.g. AI Twitter Feed"></div>
    <div class="form-row"><label>${t('sourceType')}</label><select id="sf_type" onchange="onTypeChange()">${typeOptions}</select></div>
    <div class="form-row"><label>${t('sourceConfig')}</label><textarea id="sf_config" style="font-family:monospace;font-size:12px;min-height:100px;">${esc(configVal)}</textarea></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:12px;">
      <div>
        <label>${lang === 'zh' ? '主分类' : 'Category'}</label>
        <input id="sf_category" list="cat_list_manual" value="${esc(subInfo ? subInfo.category : '')}" placeholder="AI">
        <datalist id="cat_list_manual">${allCats.map(c => `<option value="${esc(c)}">`).join('')}</datalist>
      </div>
      <div>
        <label>${lang === 'zh' ? '子分类' : 'Subcategory'}</label>
        <input id="sf_subcategory" list="sub_list_manual" value="${esc(subInfo ? subInfo.subcategory : '')}" placeholder="Leaders">
        <datalist id="sub_list_manual">${allSubs.map(sub => `<option value="${esc(sub)}">`).join('')}</datalist>
      </div>
    </div>
    <div class="form-actions">
      <button class="primary" onclick="saveSource()">${t('save')}</button>
      <button onclick="showSourceForm=false;editingSource=null;renderSourceForm()">${t('cancel')}</button>
    </div>
  </div>`;
    }

    async function saveSource() {
      const name = document.getElementById('sf_name').value.trim();
      const type = document.getElementById('sf_type').value;
      const config = document.getElementById('sf_config').value.trim();
      const category = (document.getElementById('sf_category')?.value || '').trim();
      const subcategory = (document.getElementById('sf_subcategory')?.value || '').trim();
      if (!name) return;
      try { JSON.parse(config); } catch { showToast('Invalid JSON config'); return; }
      try {
        if (editingSource) {
          await fetch(`${API}/sources/${editingSource.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, type, config }) });
          await fetch(`${API}/subscriptions/${editingSource.id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ category, subcategory }) });
          showToast(t('sourceUpdated'));
        } else {
          await fetch(`${API}/sources`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, type, config, category, subcategory }) });
          showToast(t('sourceCreated'));
        }
        showSourceForm = false; editingSource = null;
        renderSources();
      } catch (e) { showToast('Error: ' + e.message); }
    }

    async function toggleSource(id, active) {
      await fetch(`${API}/sources/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'same-origin', body: JSON.stringify({ isActive: active }) });
    }

    async function unsubSource(id) {
      await fetch(`${API}/subscriptions/${id}`, { method: 'DELETE', credentials: 'same-origin' });
      showToast(lang === 'zh' ? '已退订' : 'Unsubscribed');
      renderSources();
    }

    async function delSource(id) {
      if (!confirm(t('confirmDelete'))) return;
      await fetch(`${API}/sources/${id}`, { method: 'DELETE', credentials: 'same-origin' });
      showToast(t('sourceDeleted'));
      renderSources();
    }

    async function loadMarkedUrls() {
      try {
        const r = await fetch(`${API}/marks`);
        if (r.ok) {
          const marks = await r.json();
          markedUrls.clear();
          marks.forEach(m => markedUrls.set(m.url, m.id));
        }
      } catch { }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    async function doMark(url, btn) {
      try {
        const r = await fetch(`${API}/marks`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ url })
        });
        const d = await r.json();
        if (d.ok) {
          // Reload marks to get the new mark id
          const mr = await fetch(`${API}/marks`, { credentials: 'same-origin' });
          if (mr.ok) { const marks = await mr.json(); markedUrls.clear(); marks.forEach(m => markedUrls.set(m.url, m.id)); }
          const newId = markedUrls.get(url);
          btn.textContent = t('marked');
          btn.classList.add('marked');
          btn.onclick = () => doUnmark(url, newId, btn);
          showToast(d.duplicate ? t('markDup') : t('markSuccess'));
        }
      } catch (e) { showToast(t('markFail') + ': ' + e.message); }
    }

    async function doUnmark(url, markId, btn) {
      if (!confirm(lang === 'zh' ? '确定取消收藏？' : 'Remove this mark?')) return;
      try {
        const r = await fetch(`${API}/marks/${markId}`, { method: 'DELETE', credentials: 'same-origin' });
        const d = await r.json();
        if (d.ok) {
          markedUrls.delete(url);
          btn.textContent = t('mark');
          btn.classList.remove('marked');
          btn.onclick = () => doMark(url, btn);
          showToast(lang === 'zh' ? '已取消收藏' : 'Unmarked');
          if (currentType === 'marks') renderMarks();
        }
      } catch (e) { showToast('❌ ' + e.message); }
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelector('.tab.active')?.classList.remove('active');
        tab.classList.add('active');
        currentType = tab.dataset.type;
        currentOffset = 0; allLoaded = false;
        location.hash = currentType;
        document.getElementById('viewer').style.display = 'none';
        renderList();
      };
    });

    if (location.hash) {
      const h = location.hash.substring(1);
      if (['4h', 'daily', 'weekly', 'monthly', 'marks', 'sources'].includes(h)) {
        currentType = h;
        document.querySelector('.tab.active')?.classList.remove('active');
        const t = document.querySelector('.tab[data-type="' + h + '"]');
        if (t) t.classList.add('active');
      }
    }

    document.addEventListener('click', (e) => {
      document.querySelectorAll('.user-dropdown.show').forEach(dd => {
        if (!e.target.closest('.user-menu')) dd.classList.remove('show');
      });
    });
    applyLang();

    // Initialize
    applyLang();
    renderList();
  </script>
</body>

</html>
